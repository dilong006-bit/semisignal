# EduScope 를 GitHub Pages 에 자동 빌드·배포한다.
# main 브랜치에 push 될 때마다 Vite 로 빌드한 dist/ 를 Pages 에 올린다.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch: # 깃허브 화면에서 수동 실행도 가능

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 번만 배포되도록 직렬화
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
